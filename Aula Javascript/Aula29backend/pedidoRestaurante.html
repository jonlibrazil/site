<body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center;">
    <h1>Painel do Restaurante</h1>            
    
    <div style="background-color: #f1f1f1; padding: 20px; width: fit-content; border-radius: 15px; margin-bottom: 20px;">
        <h3>Abrir Nova Mesa</h3>
        <label for="numMesa">Número da Mesa:</label>
        <input type="number" id="numMesa" placeholder="Ex: 5" style="margin-bottom: 10px; display: block; padding: 5px;" />
        
        <label for="txtPedido">Primeiro Pedido:</label>
        <textarea id="txtPedido" placeholder="Ex:&#10;Camarão a milanesa&#10;Suco de Laranja" style="margin-bottom: 10px; display: block; padding: 5px; width: 250px; height: 80px;"></textarea>        
        <button onclick="adicionarNovaMesa()">Cadastrar Mesa</button>
    </div>

    <div id="painelMesas"></div>

    <script src="scriptRestaurante.js" defer></script>
</body>
