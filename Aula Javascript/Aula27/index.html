<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Configura a página para ser responsiva-->
    <title>Aula 27 JS</title>
    <!-- <link rel="stylesheet" href="style3.css"> --> 
    <script src="scriptA27.js" defer></script>   
        <!-- defer - para fazer o script ser lido depois de carregar a pagina html -->
    <style>
        label,button{
            display: block;
        }
    </style>
</head>

<body>
    <h1>Formulário de contato</h1>
    <form action="" id="contactForm">
        <label for="name">Nome:</label>
        <input type="text" id="name" required maxlength="256">
        <label for="email">E-mail:</label>
        <input type="email" id="email" required maxlength="356">
        <label for="message">Mensagem:</label>
        <textarea name="" id="message" required></textarea>
        <button type="submit">Enviar</button>
    </form> 

    <br><br><br>

    <form id="formTest">
        <label for="email">E-mail:</label>
        <input type="email" id="email2" required>
        <label for="phone">Telefone:</label>
        <input type="tel" id="phone" required>
        <label for="password">Senha:</label>
        <input type="password" id="password" required>
        <button type="submit">Enviar</button>






    </form>



</body>
</html>
